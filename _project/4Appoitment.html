<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <div>
        <label for="Name">Patient Name :- </label>
        <input type="text" name="Name" placeholder="Enter Full Name" id="Name">
        </div>
         
        <div>
        <label for="phone">Phone Number :- </label>
        <input type="tel" id="phone" name="phone">
        </div>

        <div>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="xyz@gmail.com" name="email">
        </div>

        <div>
        <label for="birth">Date of Birth</label>
        <input type="date" id="birth" name="birth">
        </div>

        <div>
        <label for="date">Appointment Date</label>
        <input type="datetime-local" id="date" name="date">
        </div>

        <div>
        <label>Gender</label>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>
        </div>

        <div>
        <label for="department"> Select Department :-
        <select name="department" id="department" >
            <option value="General Medicine">General Medicine</option> 
            <option value="Cardiology">Cardiology</option> 
            <option value="Orthopedics ">Orthopedics </option> 
            <option value="Pediatrics">Pediatrics</option> 
            <option value="Energency & Trauma Care">Energency & Trauma Care</option>
        </select>
        </label>
        </div>
        
        <div>
        <label for="symptoms">Symptoms :- </label>
        <textarea id="symptoms" cols="10" rows="2" name="sympotoms"></textarea>
        </div>

        <div>
        <input type="submit" value="submit" name="submit" >
        <input type="reset" value="reset" name="reset">
        </div>
        
    </form>
    
</body>
</html>
